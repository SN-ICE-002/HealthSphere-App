# =============================================================
# HealthSphere CI/CD Pipeline (Simplified)
# =============================================================

name: HealthSphere CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Backend
        run: |
          cd backend
          npm install
          npm run build

      - name: Install & Build Frontend
        run: |
          cd healthsphere
          npm install
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false

      - name: Trigger Render Deploy (Main Branch Only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Triggering Backend Deploy..."
          curl -f -s -S -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys"
            
          echo -e "\nTriggering Frontend Deploy..."
          curl -f -s -S -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys"

