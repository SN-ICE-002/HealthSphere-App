name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Project Checks ──
      - name: Install dependencies
        run: npm run install:all

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Run backend app
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for server
        run: sleep 3

      - name: Test backend API
        run: curl -f http://localhost:5000/api/health
        
      - name: Stop server
        run: pkill node || true
