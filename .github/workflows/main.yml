name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Secret Validation ──
      - name: Verify Secrets Configuration
        run: |
          echo "Checking repository secrets..."
          
          if [ -n "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "✅ RENDER_API_KEY is securely configured!"
          else
            echo "❌ RENDER_API_KEY is missing."
          fi
          
          if [ -n "${{ secrets.RENDER_BACKEND_SERVICE_ID }}" ]; then
            echo "✅ RENDER_BACKEND_SERVICE_ID is securely configured!"
          else
            echo "❌ RENDER_BACKEND_SERVICE_ID is missing."
          fi
          
          if [ -n "${{ secrets.RENDER_FRONTEND_SERVICE_ID }}" ]; then
            echo "✅ RENDER_FRONTEND_SERVICE_ID is securely configured!"
          else
            echo "❌ RENDER_FRONTEND_SERVICE_ID is missing."
          fi
          
          if [ -n "${{ secrets.REACT_APP_API_URL }}" ]; then
            echo "✅ REACT_APP_API_URL is securely configured!"
          else
            echo "❌ REACT_APP_API_URL is missing."
          fi

      # ── Project Checks ──
      - name: Install dependencies
        run: npm run install:all

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Run backend app
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for server
        run: sleep 3

      - name: Test backend API
        run: curl -f http://localhost:5000/api/health
        
      - name: Stop server
        run: pkill node || true
