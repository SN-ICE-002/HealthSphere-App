name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Backend Checks ──
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Run backend app
        run: |
          cd backend
          node server.js &
        env:
          PORT: 5000

      - name: Wait for server
        run: sleep 3

      - name: Test backend API
        run: curl -f http://localhost:5000/api/health
        
      - name: Stop server
        run: pkill node || true

      # ── Frontend Checks ──
      - name: Install frontend dependencies
        run: |
          cd healthsphere
          npm install

      - name: Build frontend
        run: |
          cd healthsphere
          npm run build
        env:
          CI: false
